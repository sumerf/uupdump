name: Build UUP ISO

on:
  workflow_dispatch:
    inputs:
      target:
        description: Windows target
        required: true
        default: win11-25h2
        type: choice
        options:
          - all
          - win11-25h2
          - win11-26h1
          - win11-ltsc-2024
          - win10-22h2
          - win10-ltsc-2021
      arch:
        description: Architecture
        required: true
        default: amd64
        type: choice
        options:
          - amd64
          - arm64
          - x86
      lang:
        description: Language pack
        required: true
        default: zh-cn
  schedule:
    - cron: "0 18 8-14 * 2"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 1440
    env:
      SELECTED_TARGET: ${{ github.event.inputs.target || 'all' }}
      SELECTED_ARCH: ${{ github.event.inputs.arch || 'amd64' }}
      SELECTED_LANG: ${{ github.event.inputs.lang || 'zh-cn' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build and publish selected target
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $all = "${{ github.event_name }}" -eq "schedule" -or $env:SELECTED_TARGET -eq "all"
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/run-selected-targets.ps1 -Target $env:SELECTED_TARGET -Arch $env:SELECTED_ARCH -Lang $env:SELECTED_LANG -All:$all

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: uup-iso
          path: uup-output-*/*
          if-no-files-found: error
          retention-days: 7
