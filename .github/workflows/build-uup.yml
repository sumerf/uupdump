name: Build UUP ISO
run-name: Build all UUP ISOs - amd64 ${{ github.event.inputs.lang || 'zh-cn' }}

on:
  workflow_dispatch:
    inputs:
      lang:
        description: Language pack
        required: true
        default: zh-cn
        type: choice
        options:
          - zh-cn
          - en-us
          - zh-tw
          - ja-jp
          - ko-kr
          - de-de
          - fr-fr
          - es-es
          - ru-ru
          - pt-br
      include_updates:
        description: Include updates
        required: true
        default: true
        type: boolean
      cleanup:
        description: Run component cleanup
        required: true
        default: false
        type: boolean
      netfx3:
        description: Integrate .NET Framework 3.5
        required: true
        default: false
        type: boolean
      image_format:
        description: Install image format
        required: true
        default: wim
        type: choice
        options:
          - wim
          - esd
  schedule:
    - cron: "0 18 8-14 * 2"

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/reusable-build-uup.yml
    with:
      target: all
      arch: amd64
      lang: ${{ github.event.inputs.lang || 'zh-cn' }}
      include-updates: ${{ github.event.inputs.include_updates != 'false' }}
      cleanup: ${{ github.event.inputs.cleanup == 'true' }}
      netfx3: ${{ github.event.inputs.netfx3 == 'true' }}
      image-format: ${{ github.event.inputs.image_format || 'wim' }}
      all: true
      allow-failures: true
