name: Build UUP ISO
run-name: Build all UUP ISOs - amd64 ${{ github.event.inputs.lang || 'zh-cn' }}

on:
  workflow_dispatch:
    inputs:
      lang:
        description: Language pack
        required: true
        default: zh-cn
        type: choice
        options:
          - zh-cn
          - en-us
          - zh-tw
          - ja-jp
          - ko-kr
          - de-de
          - fr-fr
          - es-es
          - ru-ru
          - pt-br
  schedule:
    - cron: "0 18 8-14 * 2"

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/reusable-build-uup.yml
    with:
      target: all
      arch: amd64
      lang: ${{ github.event.inputs.lang || 'zh-cn' }}
      all: true
