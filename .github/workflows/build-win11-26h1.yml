name: Build Windows 11 26H1 ISO
run-name: Build Windows 11 26H1 - ${{ github.event.inputs.arch || 'amd64' }} ${{ github.event.inputs.lang || 'zh-cn' }}

on:
  workflow_dispatch:
    inputs:
      arch:
        description: Architecture
        required: true
        default: amd64
        type: choice
        options:
          - amd64
          - arm64
      lang:
        description: Language pack
        required: true
        default: zh-cn
        type: choice
        options:
          - zh-cn
          - en-us
          - zh-tw
          - ja-jp
          - ko-kr
          - de-de
          - fr-fr
          - es-es
          - ru-ru
          - pt-br
      include_updates:
        description: Include updates
        required: true
        default: true
        type: boolean
      cleanup:
        description: Run component cleanup
        required: true
        default: false
        type: boolean
      netfx3:
        description: Integrate .NET Framework 3.5
        required: true
        default: false
        type: boolean
      image_format:
        description: Install image format
        required: true
        default: wim
        type: choice
        options:
          - wim
          - esd

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/reusable-build-uup.yml
    with:
      target: win11-26h1
      arch: ${{ github.event.inputs.arch || 'amd64' }}
      lang: ${{ github.event.inputs.lang || 'zh-cn' }}
      include-updates: ${{ github.event.inputs.include_updates != 'false' }}
      cleanup: ${{ github.event.inputs.cleanup == 'true' }}
      netfx3: ${{ github.event.inputs.netfx3 == 'true' }}
      image-format: ${{ github.event.inputs.image_format || 'wim' }}
      all: false
